<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aperture-Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glow-blob blob-1"></div>
<div class="glow-blob blob-2"></div>
<div class="glow-blob blob-3"></div>
<header>
  <h1 class="logo">Aperture</h1>
  <p class="tagline">A curated space for your best shots.</p>
</header>

<div class="filters" id="filters"></div>

<main class="gallery" id="gallery"></main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lb-top">
    <div class="lb-counter mono"><b id="lbIndex">01</b> / <span id="lbTotal">15</span></div>
    <div class="lb-actions">
      <button class="icon-btn" id="editToggle" title="Edit photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </button>
      <button class="icon-btn primary" id="lbDownload" title="Download">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
      </button>
      <button class="icon-btn" id="lbClose" title="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
  </div>

  <div class="lb-body">
    <div class="nav-btn nav-prev" id="prevBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    </div>
    <div class="lb-stage" id="lbStage">
      <img id="lbImage" src="" alt="">
      <div class="crop-overlay" id="cropOverlay">
        <div class="crop-handle nw"></div>
        <div class="crop-handle ne"></div>
        <div class="crop-handle sw"></div>
        <div class="crop-handle se"></div>
      </div>
    </div>
    <div class="nav-btn nav-next" id="nextBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
    </div>
  </div>

  <div class="lb-caption">
    <div class="t" id="lbTitle"></div>
  </div>

  <div class="filmstrip" id="filmstrip"></div>
</div>

<div class="backdrop-dim" id="backdropDim"></div>

<!-- EDIT DRAWER -->
<div class="edit-drawer" id="editDrawer">
  <div class="edit-head">
    <h3>Edit</h3>
    <button class="icon-btn" id="editClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>
  <div class="edit-body">

    <div class="edit-section">
      <label>Transform</label>
      <div class="tool-row">
        <button class="tool-btn" id="cropTool">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/></svg>
          Crop
        </button>
        <button class="tool-btn" id="rotateTool">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>
          Rotate
        </button>
        <button class="tool-btn" id="flipTool">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18"/><path d="m16 7 4 4-4 4"/><path d="m8 7-4 4 4 4"/></svg>
          Flip
        </button>
      </div>
      <div class="tool-row" id="cropConfirmRow" style="display:none;">
        <button class="btn" id="cropCancel">Cancel</button>
        <button class="btn primary" id="cropApply">Apply crop</button>
      </div>
    </div>

    <div class="edit-section">
      <label>Adjust</label>
      <div class="slider-row">
        <div class="lbl"><span>Brightness</span><span id="valBrightness">100%</span></div>
        <input type="range" id="brightness" min="50" max="150" value="100">
      </div>
      <div class="slider-row">
        <div class="lbl"><span>Contrast</span><span id="valContrast">100%</span></div>
        <input type="range" id="contrast" min="50" max="150" value="100">
      </div>
      <div class="slider-row">
        <div class="lbl"><span>Saturation</span><span id="valSaturation">100%</span></div>
        <input type="range" id="saturation" min="0" max="200" value="100">
      </div>
      <div class="slider-row">
        <div class="lbl"><span>Warmth</span><span id="valWarmth">0°</span></div>
        <input type="range" id="warmth" min="-30" max="30" value="0">
      </div>
    </div>

    <div class="edit-section">
      <label>Neon presets</label>
      <div class="preset-grid" id="presetGrid">
        <button class="preset-btn active" data-preset="none">Original</button>
        <button class="preset-btn" data-preset="bw">B&amp;W</button>
        <button class="preset-btn" data-preset="sepia">Sepia</button>
        <button class="preset-btn" data-preset="vibrant">Vibrant</button>
        <button class="preset-btn" data-preset="cool">Cool</button>
        <button class="preset-btn" data-preset="warm">Warm</button>
      </div>
    </div>

  </div>
  <div class="edit-foot">
    <button class="btn" id="resetEdits">Reset</button>
    <button class="btn primary" id="saveEdits">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
      Save photo
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
